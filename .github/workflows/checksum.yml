name: Update checksum

on:
  push:
    branches:
      - main
    paths:
      - taskfloat.py

jobs:
  checksum:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate SHA-256 checksum
        run: shasum -a 256 taskfloat.py | awk '{print $1}' > taskfloat.py.sha256
      - name: Commit updated checksum
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taskfloat.py.sha256
          git diff --cached --quiet || git commit -m "chore: update taskfloat.py.sha256 [skip ci]"
          git push
