<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- White background -->
  <rect width="48" height="48" rx="6" fill="white"/>
  <!-- Blue top bar -->
  <rect x="0" y="0" width="48" height="13" rx="6" fill="#1A73E8"/>
  <rect x="0" y="7" width="48" height="6" fill="#1A73E8"/>
  <!-- Calendar hanger dots -->
  <circle cx="16" cy="4" r="2" fill="white"/>
  <circle cx="32" cy="4" r="2" fill="white"/>
  <!-- "31" in blue -->
  <text x="24" y="35" text-anchor="middle" font-family="-apple-system, Arial, sans-serif" font-size="17" font-weight="700" fill="#1A73E8">31</text>
  <!-- Colorful bottom corner dots (Google colors) -->
  <rect x="5" y="39" width="5" height="5" rx="1" fill="#EA4335"/>
  <rect x="12" y="39" width="5" height="5" rx="1" fill="#FBBC04"/>
  <rect x="19" y="39" width="5" height="5" rx="1" fill="#34A853"/>
  <rect x="26" y="39" width="5" height="5" rx="1" fill="#4285F4"/>
</svg>
